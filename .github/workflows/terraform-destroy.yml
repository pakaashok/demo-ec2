name: Terraform Destroy EC2

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Updated to v4 for 2026 standards

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-east-1

    - name: Terraform Init
      # Adding -input=false ensures it doesn't hang waiting for user input
      run: terraform init -input=false

    - name: Terraform Plan Destroy
      # It is best practice to run a plan first to see what is happening
      run: terraform plan -destroy

    - name: Terraform Destroy
      # Use -input=false here as well
      run: terraform destroy -auto-approve -input=false