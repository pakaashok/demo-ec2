name: Terraform Destroy EC2

on:
  workflow_dispatch:

# REQUIRED for OIDC handshake
permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # the Deploy workflow
        role-to-assume: arn:aws:iam::357312912471:role/GitHubActionTestRole
        aws-region: us-east-1

    - name: Terraform Init
      run: terraform init -input=false

    - name: Terraform Plan Destroy
      # This shows you what will be deleted in the GitHub logs before the actual destroy
      run: terraform plan -destroy -input=false

    - name: Terraform Destroy
      run: terraform destroy -auto-approve -input=false