name: Terraform EC2 Deploy

on:
  push:
    branches:
      - main
      - master

# REQUIRED: These permissions allow the GitHub runner to request an OIDC token 
# from AWS and read your repository content.
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # the OIDC setup
        role-to-assume: arn:aws:iam::357312912471:role/GitHubActionTestRole
        aws-region: us-east-1

    - name: Terraform Init
      # Added -input=false to prevent the job from hanging in a CI environment
      run: terraform init -input=false

    - name: Terraform Plan
      run: terraform plan -input=false

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false